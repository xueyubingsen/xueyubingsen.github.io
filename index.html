<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TiDB 知识图谱工作台</title>
  <script src="https://unpkg.com/force-graph@1.48.0/dist/force-graph.min.js"></script>
  <script src="https://unpkg.com/three@0.159.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.78.3/dist/3d-force-graph.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #dbe3f0;
      --primary: #2d6bff;
      --danger: #d84d4d;
      --text: #1f2a37;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(31, 42, 55, 0.04);
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding-right: 4px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .stats {
      display: flex;
      gap: 8px;
      margin: 8px 0 2px;
    }

    .badge {
      background: #eef4ff;
      border: 1px solid #cddcff;
      color: #214eb0;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    input, textarea, select {
      border: 1px solid #cfd8e5;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      width: 100%;
      background: #fff;
    }

    textarea { min-height: 82px; resize: vertical; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    button.secondary { background: #5a6679; }
    button.danger { background: var(--danger); }

    .status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: #1e7a2f;
    }

    .table-wrap {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #eef2f7;
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fbff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .graph-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    #graph-container {
      flex: 1;
      min-height: 700px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(to bottom, #fbfdff, #f5f9ff);
    }

    .g6-tooltip {
      background: rgba(16, 24, 40, 0.9);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      max-width: 300px;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .page {
        grid-template-columns: 1fr;
      }
      .left-column { max-height: none; }
      #graph-container { min-height: 520px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="left-column">
      <section class="panel">
        <h1>TiDB 知识图谱工作台</h1>
        <p class="muted">将“导入 → 编辑 → 可视化 → 导出”流程整合到一个界面，底层数据落地为 SQLite。</p>
        <div class="stats">
          <span class="badge" id="node-count">节点 0</span>
          <span class="badge" id="edge-count">连线 0</span>
        </div>
      </section>

      <section class="panel">
        <h2>1) 数据导入 / 导出</h2>
        <div class="field">
          <label>从 JSON 文本导入（结构需包含 nodes、edges）</label>
          <textarea id="json-input" placeholder='{"nodes": [...], "edges": [...]} or []'></textarea>
        </div>
        <div class="field">
          <label>或选择本地 JSON 文件</label>
          <input type="file" id="json-file" accept="application/json,.json" />
        </div>
        <div class="actions">
          <button id="btn-load-default">加载默认数据</button>
          <button id="btn-import-json" class="secondary">导入到 SQLite</button>
          <button id="btn-export-json">导出 JSON</button>
          <button id="btn-export-db" class="secondary">导出 SQLite</button>
        </div>
        <div class="field" style="margin-top: 12px;">
          <label>对象存储预签名上传 URL（PUT）</label>
          <input id="oss-presigned-url" placeholder="https://xxx/your-object?signature=..." />
        </div>
        <div class="actions">
          <button id="btn-upload-json" class="secondary">上传 JSON 到对象存储</button>
          <button id="btn-upload-db" class="secondary">上传 SQLite 到对象存储</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="panel">
        <h2>2) 节点编辑</h2>
        <div class="field"><label>节点 ID（唯一）</label><input id="node-id" /></div>
        <div class="field"><label>显示名称</label><input id="node-label" /></div>
        <div class="field"><label>详情</label><textarea id="node-details"></textarea></div>
        <div class="field"><label>链接</label><input id="node-link" placeholder="https://..." /></div>
        <div class="field"><label>初始权重 originalDegree</label><input id="node-degree" type="number" value="0" /></div>
        <div class="field"><label>初始大小 originalSize</label><input id="node-size" type="number" value="20" /></div>
        <div class="actions">
          <button id="btn-save-node">新增/更新节点</button>
          <button id="btn-delete-node" class="danger">删除节点</button>
        </div>
      </section>

      <section class="panel">
        <h2>3) 连线编辑</h2>
        <div class="field"><label>源节点 source</label><input id="edge-source" /></div>
        <div class="field"><label>目标节点 target</label><input id="edge-target" /></div>
        <div class="field"><label>关系描述 label（可选）</label><input id="edge-label" /></div>
        <div class="actions">
          <button id="btn-add-edge">新增连线</button>
          <button id="btn-delete-edge" class="danger">删除连线</button>
        </div>
      </section>

      <section class="panel">
        <h2>4) SQLite 数据预览</h2>
        <p class="muted">点击表格行可自动填充到编辑区。</p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>节点ID</th><th>名称</th><th>权重</th></tr></thead>
            <tbody id="nodes-table"></tbody>
          </table>
        </div>
        <br />
        <div class="table-wrap">
          <table>
            <thead><tr><th>source</th><th>target</th><th>label</th></tr></thead>
            <tbody id="edges-table"></tbody>
          </table>
        </div>
      </section>
    </div>

    <section class="panel graph-panel">
      <div class="toolbar">
        <select id="engine-select" style="max-width: 150px">
          <option value="2d">2D (ForceGraph)</option>
          <option value="3d">3D (ForceGraph)</option>
        </select>
        <input id="search-node" placeholder="输入节点 ID 搜索并高亮" style="max-width: 260px" />
        <button id="btn-focus">定位节点</button>
        <button id="btn-refresh" class="secondary">刷新图谱</button>
        <button id="btn-reset-view" class="secondary">重置视图</button>
      </div>
      <div id="graph-container"></div>
    </section>
  </div>

  <script>
    let SQL;
    let db;
    let graph;
    let graph3D;
    let currentEngine = '2d';
    let graphDataCache = { nodes: [], edges: [] };

    const statusEl = document.getElementById('status');
    const nodeCountEl = document.getElementById('node-count');
    const edgeCountEl = document.getElementById('edge-count');

    function setStatus(message, error = false) {
      statusEl.style.color = error ? '#c03434' : '#1e7a2f';
      statusEl.textContent = message;
    }

    function queryRows(sql, params = []) {
      const result = db.exec(sql, params);
      if (!result.length) return [];
      const { columns, values } = result[0];
      return values.map(row => Object.fromEntries(row.map((v, i) => [columns[i], v])));
    }

    function initDb() {
      db.run(`
        CREATE TABLE IF NOT EXISTS nodes (
          id TEXT PRIMARY KEY,
          label TEXT NOT NULL,
          details TEXT,
          link TEXT,
          original_degree INTEGER DEFAULT 0,
          original_size INTEGER DEFAULT 20,
          updated_at TEXT DEFAULT CURRENT_TIMESTAMP
        );
      `);
      db.run(`
        CREATE TABLE IF NOT EXISTS edges (
          source TEXT NOT NULL,
          target TEXT NOT NULL,
          label TEXT,
          updated_at TEXT DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (source, target)
        );
      `);
    }

    function normalizeGraphJson(data) {
      if (Array.isArray(data)) return { nodes: data, edges: [] };
      return { nodes: data.nodes || [], edges: data.edges || [] };
    }

    function upsertGraphData(data, replace = true) {
      const normalized = normalizeGraphJson(data);
      if (replace) {
        db.run('DELETE FROM edges;');
        db.run('DELETE FROM nodes;');
      }

      const insertNode = db.prepare(`
        INSERT INTO nodes(id, label, details, link, original_degree, original_size, updated_at)
        VALUES (?, ?, ?, ?, ?, ?, CURRENT_TIMESTAMP)
        ON CONFLICT(id) DO UPDATE SET
          label = excluded.label,
          details = excluded.details,
          link = excluded.link,
          original_degree = excluded.original_degree,
          original_size = excluded.original_size,
          updated_at = CURRENT_TIMESTAMP;
      `);

      normalized.nodes.forEach(node => {
        insertNode.run([
          node.id,
          node.label || node.id,
          node.details || '',
          node.link || '',
          Number(node.originalDegree || 0),
          Number(node.originalSize || node.size || 20)
        ]);
      });
      insertNode.free();

      const insertEdge = db.prepare(`
        INSERT INTO edges(source, target, label, updated_at)
        VALUES (?, ?, ?, CURRENT_TIMESTAMP)
        ON CONFLICT(source, target) DO UPDATE SET
          label = excluded.label,
          updated_at = CURRENT_TIMESTAMP;
      `);

      normalized.edges.forEach(edge => {
        if (!edge.source || !edge.target) return;
        insertEdge.run([edge.source, edge.target, edge.label || '']);
      });
      insertEdge.free();
    }

    function loadGraphDataFromDb() {
      const nodes = queryRows('SELECT * FROM nodes ORDER BY id;').map(node => ({
        id: node.id,
        label: node.label,
        details: node.details,
        link: node.link,
        originalDegree: Number(node.original_degree || 0),
        originalSize: Number(node.original_size || 20)
      }));
      const edges = queryRows('SELECT source, target, label FROM edges ORDER BY source, target;').map(e => ({
        source: e.source,
        target: e.target,
        label: e.label
      }));

      const degreeMap = Object.fromEntries(nodes.map(n => [n.id, 0]));
      edges.forEach(edge => {
        if (degreeMap[edge.source] !== undefined) degreeMap[edge.source] += 1;
        if (degreeMap[edge.target] !== undefined) degreeMap[edge.target] += 1;
      });

      const palette = [
        { t: 0, fill: '#cfd4dd', stroke: '#98a2b3' },
        { t: 1, fill: '#8ec5ff', stroke: '#4f8de8' },
        { t: 4, fill: '#77d1c5', stroke: '#2c9d90' },
        { t: 8, fill: '#ffcc66', stroke: '#d99a25' },
        { t: 12, fill: '#ff9b6f', stroke: '#d76a38' },
        { t: 16, fill: '#f26666', stroke: '#c63e3e' }
      ];

      nodes.forEach(node => {
        const realTimeDegree = degreeMap[node.id] || 0;
        node.degree = node.originalDegree + realTimeDegree;
        node.size = node.originalSize + (realTimeDegree + 1) * 3;
        node.realTimeDegree = realTimeDegree;

        let color = palette[0];
        for (let i = palette.length - 1; i >= 0; i--) {
          if (node.degree >= palette[i].t) {
            color = palette[i];
            break;
          }
        }
        node.style = { fill: color.fill, stroke: color.stroke, lineWidth: 1.4 };
      });

      return { nodes, edges };
    }

    function renderTables() {
      const nodes = queryRows('SELECT id, label, original_degree FROM nodes ORDER BY id;');
      const edges = queryRows('SELECT source, target, label FROM edges ORDER BY source, target;');

      nodeCountEl.textContent = `节点 ${nodes.length}`;
      edgeCountEl.textContent = `连线 ${edges.length}`;

      const nodesTable = document.getElementById('nodes-table');
      nodesTable.innerHTML = '';
      nodes.forEach(node => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${node.id}</td><td>${node.label || ''}</td><td>${node.original_degree || 0}</td>`;
        tr.addEventListener('click', () => fillNodeForm(node.id));
        nodesTable.appendChild(tr);
      });

      const edgesTable = document.getElementById('edges-table');
      edgesTable.innerHTML = '';
      edges.forEach(edge => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${edge.source}</td><td>${edge.target}</td><td>${edge.label || ''}</td>`;
        tr.addEventListener('click', () => {
          document.getElementById('edge-source').value = edge.source;
          document.getElementById('edge-target').value = edge.target;
          document.getElementById('edge-label').value = edge.label || '';
        });
        edgesTable.appendChild(tr);
      });
    }

    function fillNodeForm(nodeId) {
      const rows = queryRows('SELECT * FROM nodes WHERE id = ?;', [nodeId]);
      if (!rows.length) return;
      const node = rows[0];
      document.getElementById('node-id').value = node.id;
      document.getElementById('node-label').value = node.label;
      document.getElementById('node-details').value = node.details || '';
      document.getElementById('node-link').value = node.link || '';
      document.getElementById('node-degree').value = Number(node.original_degree || 0);
      document.getElementById('node-size').value = Number(node.original_size || 20);
    }

    function destroyGraphIfNeeded() {
      if (graph) {
        graph._destructor?.();
      }
      graph = null;
      if (graph3D) {
        document.getElementById('graph-container').innerHTML = '';
        graph3D = null;
      }
    }

    function renderGraph2D(data) {
      const container = document.getElementById('graph-container');
      destroyGraphIfNeeded();
      container.innerHTML = '';

      const nodes = data.nodes.map(node => ({
        ...node,
        color: node.style?.fill || '#8ec5ff',
        borderColor: node.style?.stroke || '#4f8de8',
        val: Math.max(node.size / 7, 3)
      }));
      const links = data.edges.map(edge => ({ source: edge.source, target: edge.target, label: edge.label || '' }));

      graph = ForceGraph()(container)
        .backgroundColor('#f5f9ff')
        .graphData({ nodes, links })
        .nodeId('id')
        .nodeLabel(node => `${node.label}<br/>ID: ${node.id}<br/>基础权重: ${node.originalDegree}<br/>实时连接数: ${node.realTimeDegree}<br/>最终权重: ${node.degree}<br/>${node.details || ''}`)
        .nodeVal(node => node.val)
        .nodeCanvasObject((node, ctx, globalScale) => {
          const label = node.label || node.id;
          const fontSize = Math.max(10 / globalScale, 3);
          const radius = Math.max(6, node.val || 6);

          ctx.beginPath();
          ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI, false);
          ctx.fillStyle = node.color;
          ctx.fill();
          ctx.lineWidth = Math.max(1.2 / globalScale, 0.5);
          ctx.strokeStyle = node.borderColor;
          ctx.stroke();

          ctx.font = `${fontSize}px Sans-Serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#16202d';
          ctx.fillText(label, node.x, node.y);
        })
        .linkColor(() => 'rgba(152, 162, 179, 0.58)')
        .linkWidth(1.1)
        .linkDirectionalArrowLength(5)
        .linkDirectionalArrowRelPos(1)
        .d3VelocityDecay(0.23)
        .onNodeDragEnd(node => {
          node.fx = node.x;
          node.fy = node.y;
        });

      graph.d3Force('charge').strength(-220);
      graph.d3Force('link').distance(130);
    }

    function renderGraph3D(data) {
      const container = document.getElementById('graph-container');
      destroyGraphIfNeeded();
      container.innerHTML = '';

      const nodes = data.nodes.map(node => ({
        ...node,
        val: Math.max(node.size / 6, 2),
        color: node.style?.fill || '#8ec5ff'
      }));
      const links = data.edges.map(edge => ({ source: edge.source, target: edge.target, label: edge.label || '' }));

      graph3D = ForceGraph3D()(container)
        .backgroundColor('#f5f9ff')
        .graphData({ nodes, links })
        .nodeLabel(node => `${node.label}<br/>ID: ${node.id}<br/>权重: ${node.degree}<br/>${node.details || ''}`)
        .nodeColor(node => node.color)
        .linkWidth(0.8)
        .linkOpacity(0.35)
        .linkDirectionalParticles(1)
        .linkDirectionalParticleWidth(1.5)
        .linkDirectionalParticleSpeed(0.004)
        .cooldownTicks(Infinity)
        .d3AlphaDecay(0.02)
        .d3VelocityDecay(0.25)
        .onNodeDrag(() => graph3D.d3ReheatSimulation())
        .onNodeDragEnd(node => {
          node.fx = undefined;
          node.fy = undefined;
          node.fz = undefined;
          graph3D.d3ReheatSimulation();
        })
        .onNodeClick(node => {
          const distance = 180;
          const distRatio = 1 + distance / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
          graph3D.cameraPosition(
            { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
            node,
            900
          );
        });
    }

    function renderGraph() {
      graphDataCache = loadGraphDataFromDb();
      if (currentEngine === '3d') {
        renderGraph3D(graphDataCache);
      } else {
        renderGraph2D(graphDataCache);
      }
    }

    function refreshAll(showMsg = true) {
      renderTables();
      renderGraph();
      if (showMsg) setStatus('SQLite 数据已更新并完成图谱刷新。');
    }

    async function loadDefaultData() {
      const res = await fetch('./new_source.json');
      if (!res.ok) throw new Error(`无法读取默认数据: ${res.status}`);
      const data = await res.json();
      upsertGraphData(data, true);
      refreshAll(false);
      setStatus('已加载默认 JSON 并写入 SQLite。');
    }

    function exportJson() {
      const blob = makeJsonBlob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tidb-graph-export.json';
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus('JSON 导出完成。');
    }

    function exportSqlite() {
      const blob = makeSqliteBlob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tidb-notes.db';
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus('SQLite 导出完成。');
    }

    function makeJsonBlob() {
      const data = loadGraphDataFromDb();
      return new Blob([JSON.stringify({ nodes: data.nodes, edges: data.edges }, null, 2)], { type: 'application/json' });
    }

    function makeSqliteBlob() {
      const binary = db.export();
      return new Blob([binary], { type: 'application/x-sqlite3' });
    }

    async function uploadBlobToObjectStorage(blob, defaultFileName) {
      const url = document.getElementById('oss-presigned-url').value.trim();
      if (!url) throw new Error('请先填写对象存储预签名上传 URL。');

      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Content-Type': blob.type || 'application/octet-stream',
          'Content-Disposition': `attachment; filename="${defaultFileName}"`
        },
        body: blob
      });

      if (!res.ok) {
        const detail = await res.text().catch(() => '');
        throw new Error(`上传失败（HTTP ${res.status}）${detail ? `: ${detail.slice(0, 200)}` : ''}`);
      }
    }

    function bindEvents() {
      document.getElementById('btn-load-default').addEventListener('click', async () => {
        try { await loadDefaultData(); } catch (e) { setStatus(e.message, true); }
      });

      document.getElementById('btn-import-json').addEventListener('click', async () => {
        try {
          let text = document.getElementById('json-input').value.trim();
          const file = document.getElementById('json-file').files[0];
          if (!text && file) text = await file.text();
          if (!text) throw new Error('请先输入 JSON 文本或选择 JSON 文件。');

          const parsed = JSON.parse(text);
          upsertGraphData(parsed, true);
          refreshAll();
        } catch (e) {
          setStatus(`导入失败: ${e.message}`, true);
        }
      });

      document.getElementById('btn-export-json').addEventListener('click', exportJson);
      document.getElementById('btn-export-db').addEventListener('click', exportSqlite);
      document.getElementById('btn-upload-json').addEventListener('click', async () => {
        try {
          const blob = makeJsonBlob();
          await uploadBlobToObjectStorage(blob, 'tidb-graph-export.json');
          setStatus('JSON 已上传到对象存储。');
        } catch (e) {
          setStatus(`上传 JSON 失败: ${e.message}`, true);
        }
      });
      document.getElementById('btn-upload-db').addEventListener('click', async () => {
        try {
          const blob = makeSqliteBlob();
          await uploadBlobToObjectStorage(blob, 'tidb-notes.db');
          setStatus('SQLite 已上传到对象存储。');
        } catch (e) {
          setStatus(`上传 SQLite 失败: ${e.message}`, true);
        }
      });

      document.getElementById('btn-save-node').addEventListener('click', () => {
        try {
          const id = document.getElementById('node-id').value.trim();
          const label = document.getElementById('node-label').value.trim();
          if (!id || !label) throw new Error('节点 ID 和显示名称不能为空。');
          db.run(`
            INSERT INTO nodes(id, label, details, link, original_degree, original_size, updated_at)
            VALUES (?, ?, ?, ?, ?, ?, CURRENT_TIMESTAMP)
            ON CONFLICT(id) DO UPDATE SET
              label = excluded.label,
              details = excluded.details,
              link = excluded.link,
              original_degree = excluded.original_degree,
              original_size = excluded.original_size,
              updated_at = CURRENT_TIMESTAMP;
          `, [
            id,
            label,
            document.getElementById('node-details').value.trim(),
            document.getElementById('node-link').value.trim(),
            Number(document.getElementById('node-degree').value || 0),
            Number(document.getElementById('node-size').value || 20)
          ]);
          refreshAll();
        } catch (e) {
          setStatus(`保存节点失败: ${e.message}`, true);
        }
      });

      document.getElementById('btn-delete-node').addEventListener('click', () => {
        const id = document.getElementById('node-id').value.trim();
        if (!id) return setStatus('请先填写要删除的节点 ID。', true);
        db.run('DELETE FROM edges WHERE source = ? OR target = ?;', [id, id]);
        db.run('DELETE FROM nodes WHERE id = ?;', [id]);
        refreshAll();
      });

      document.getElementById('btn-add-edge').addEventListener('click', () => {
        try {
          const source = document.getElementById('edge-source').value.trim();
          const target = document.getElementById('edge-target').value.trim();
          const label = document.getElementById('edge-label').value.trim();
          if (!source || !target) throw new Error('source/target 不能为空。');
          const sourceExists = queryRows('SELECT 1 AS ok FROM nodes WHERE id = ?;', [source]).length;
          const targetExists = queryRows('SELECT 1 AS ok FROM nodes WHERE id = ?;', [target]).length;
          if (!sourceExists || !targetExists) throw new Error('source 和 target 必须都存在于节点表中。');

          db.run(`
            INSERT INTO edges(source, target, label, updated_at)
            VALUES (?, ?, ?, CURRENT_TIMESTAMP)
            ON CONFLICT(source, target) DO UPDATE SET
              label = excluded.label,
              updated_at = CURRENT_TIMESTAMP;
          `, [source, target, label]);
          refreshAll();
        } catch (e) {
          setStatus(`新增连线失败: ${e.message}`, true);
        }
      });

      document.getElementById('btn-delete-edge').addEventListener('click', () => {
        const source = document.getElementById('edge-source').value.trim();
        const target = document.getElementById('edge-target').value.trim();
        if (!source || !target) return setStatus('请先填写 source 和 target。', true);
        db.run('DELETE FROM edges WHERE source = ? AND target = ?;', [source, target]);
        refreshAll();
      });

      document.getElementById('btn-refresh').addEventListener('click', () => refreshAll());

      document.getElementById('engine-select').addEventListener('change', e => {
        currentEngine = e.target.value;
        renderGraph();
        setStatus(`已切换到 ${currentEngine.toUpperCase()} 视图。`);
      });

      document.getElementById('btn-reset-view').addEventListener('click', () => {
        if (currentEngine === '3d') {
          if (!graph3D) return;
          graph3D.zoomToFit(800);
          return;
        }
        if (!graph) return;
        graph.zoomToFit(800, 40);
      });

      document.getElementById('btn-focus').addEventListener('click', () => {
        const id = document.getElementById('search-node').value.trim();
        if (!id) return setStatus('请输入节点 ID。', true);
        if (currentEngine === '3d') {
          if (!graph3D) return;
          const node = graph3D.graphData().nodes.find(n => n.id === id);
          if (!node) return setStatus(`未找到节点: ${id}`, true);
          graph3D.cameraPosition({ x: (node.x || 0) + 90, y: (node.y || 0) + 90, z: (node.z || 0) + 120 }, node, 1000);
        } else {
          if (!graph) return;
          const node = graph.graphData().nodes.find(n => n.id === id);
          if (!node) return setStatus(`未找到节点: ${id}`, true);
          graph.centerAt(node.x || 0, node.y || 0, 700);
          graph.zoom(4, 600);
        }
        setStatus(`已定位节点 ${id}`);
      });

      window.addEventListener('resize', () => {
        const container = document.getElementById('graph-container');
        if (currentEngine === '3d' && graph3D) {
          graph3D.width(container.clientWidth);
          graph3D.height(container.clientHeight);
        } else if (graph) {
          graph.width(container.clientWidth);
          graph.height(container.clientHeight);
        }
      });
    }

    async function boot() {
      try {
        if (typeof ForceGraph === 'undefined') throw new Error('2D 力导向库加载失败。');
        SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}` });
        db = new SQL.Database();
        initDb();
        bindEvents();
        await loadDefaultData();
      } catch (e) {
        setStatus(`初始化失败: ${e.message}`, true);
      }
    }

    boot();
  </script>
</body>
</html>
